version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_asterisk_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./asterisk:/var/www/html
      - ./asterisk/storage:/var/www/html/storage
    ports:
      - "8001:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    networks:
      - laravel_asterisk

  redis:
    image: redis:alpine
    container_name: laravel_asterisk_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel_asterisk

networks:
  laravel_asterisk:
    driver: bridge
